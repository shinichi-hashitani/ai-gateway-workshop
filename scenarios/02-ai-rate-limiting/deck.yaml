_format_version: "3.0"

# ---------------------------------------------------------------------------
# シナリオ 2: AI Rate Limiting — トークンベースのレート制限
#
# ポイント:
#  - LLM の料金はリクエスト数ではなくトークン消費量で決まる
#  - ai-rate-limiting-advanced でトークン単位の制限をかける
#  - ai-proxy-advanced の weighted-round-robin で安価モデルを優先する
#    (高負荷・コスト超過を防ぐ多層防御の例)
#  - Consumer ごとに独立してカウント (limit_by: consumer)
# ---------------------------------------------------------------------------

services:
  - name: ai-rate-limiting-demo
    url: https://api.openai.com
    routes:
      - name: chat-with-limit
        paths:
          - /ai/chat
        methods:
          - POST
        strip_path: false
    plugins:
      # ------------------------------------------------------------------
      # ai-proxy-advanced: 2 ターゲット構成でコストを最適化
      #
      # gpt-4o-mini: 安価・高速。通常リクエストの大半を処理。
      # gpt-4o     : 高品質。複雑な質問や重要度の高い用途に。
      # round-robin でトラフィックを均等に振り分ける。
      # ------------------------------------------------------------------
      - name: ai-proxy-advanced
        config:
          targets:
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: "Bearer ${OPENAI_API_KEY}"
              model:
                provider: openai
                name: gpt-4o-mini
                options:
                  max_tokens: 256
            - route_type: llm/v1/chat
              auth:
                header_name: Authorization
                header_value: "Bearer ${OPENAI_API_KEY}"
              model:
                provider: openai
                name: gpt-4o
                options:
                  max_tokens: 256
          balancer:
            algorithm: round-robin

      # ------------------------------------------------------------------
      # ai-rate-limiting-advanced: トークンベースのレート制限
      #
      # Consumer ごとに 1分間 2,000 トークン (prompt + completion) まで。
      # match[type=consumer, partition_by=true] で Consumer 別にカウント。
      # 制限超過時は 429 Too Many Requests を返す。
      # ------------------------------------------------------------------
      - name: ai-rate-limiting-advanced
        config:
          strategy: local
          policies:
            - match:
                - type: consumer
                  partition_by: true
              limits:
                - limit: 600
                  window_size: 60
                  tokens_count_strategy: total_tokens
              window_type: sliding
          error_code: 429
          error_message: "トークンのレート制限を超えました。しばらくしてから再試行してください。"

      - name: key-auth
        config:
          key_names:
            - apikey

consumers:
  - username: demo-user
    keyauth_credentials:
      - key: "${KONG_API_KEY}"
